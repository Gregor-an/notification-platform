name: .NET CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore NotificationPlatform.sln

      - name: Build
        run: dotnet build NotificationPlatform.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test NotificationPlatform.sln --configuration Release --no-build --verbosity normal
